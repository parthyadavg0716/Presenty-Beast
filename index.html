<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRESENTY BEAST</title>
    <link rel="manifest" href="manifest.json">
    <script src="face-api.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        header {
            font-size: 26px;
            letter-spacing: 6px;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        /* 1. Breathing Effect & Camera Box */
        @keyframes breathe {
            0% { box-shadow: 0 0 10px #00ffa6; border-color: #00ffa6; }
            50% { box-shadow: 0 0 25px #00ffa6; border-color: #00ffcc; }
            100% { box-shadow: 0 0 10px #00ffa6; border-color: #00ffa6; }
        }

        #cameraBox {
            margin: 25px auto;
            width: 85%;
            height: 240px;
            border-radius: 22px;
            border: 3px solid #00ffa6;
            overflow: hidden;
            animation: breathe 3s infinite ease-in-out;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 2. Sections/Pages logic */
        .page { 
            display: none; 
            padding: 20px; 
            margin-bottom: 80px; /* Space for nav */
        }
        
        #scanPage { 
            display: block; /* सुरुवातीला फक्त स्कॅन दिसेल */
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: gold;
            min-height: 40px;
        }

        #credit {
            margin-top: 50px;
            font-size: 13px;
            color: gold;
            letter-spacing: 3px;
        }

        /* Navigation Style */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #333;
            z-index: 100;
        }

        nav div {
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 3. Active Indicator */
        nav div.active { 
            border-top: 3px solid #00d2ff; 
            color: #00ffa6; 
            padding-top: 9px; 
            margin-top: -12px; /* Pull it to the top of nav */
        }

        input {
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<header>PRESENTY BEAST</header>

<div id="scanPage" class="page">
    <div id="cameraBox">
        <video id="video" autoplay muted></video>
    </div>
    <div id="message">INITIALIZING AI...</div>
    <div id="credit">BY © PARTH VISHNU YADAV</div>
</div>

<div id="registerPage" class="page">
    <h2>REGISTER STUDENT</h2>
    <input type="text" id="studentName" placeholder="Student Name" style="width:80%; padding:15px; margin:10px 0;">
    <br>
    <input type="number" id="parentMobile" placeholder="Parent Mobile" style="width:80%; padding:15px; margin:10px 0;">
    <br><br>
    <button onclick="registerStudent()" style="background:#00ffa6; color:black; padding:15px 30px; border:none; border-radius:10px; font-weight:bold; width:85%;">CAPTURE & SAVE</button>
</div>

<div id="reportsPage" class="page">
    <h2>ATTENDANCE REPORTS</h2>
    <div id="reportList">No logs found.</div>
</div>

<nav>
    <div class="active" onclick="showPage('scanPage')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M4 6h2v2H4V6zm0 4h2v2H4v-2zm0 4h2v2H4v-2zm0 4h2v2H4v-2zm14-12h2v2h-2V6zm0 4h2v2h-2v-2zm0 4h2v2h-2v-2zm0 4h2v2h-2v-2zM8 6h8v12H8V6z"/>
        </svg>
        <br>SCAN
    </div>
    <div onclick="showPage('registerPage')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <br>REGISTER
    </div>
    <div onclick="showPage('reportsPage')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        <br>REPORTS
    </div>
</nav>

<script src="app.js"></script>

</body>
</html>
