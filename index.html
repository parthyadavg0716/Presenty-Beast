<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRESENTY BEAST</title>
    <link rel="manifest" href="manifest.json">
    <script src="face-api.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        header {
            font-size: 26px;
            letter-spacing: 6px;
            padding: 20px;
            border-bottom: 1px solid #333;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        /* Camera Box & Breathing Effect */
        #cameraBox {
            margin: 20px auto;
            width: 90%;
            height: 380px;
            border-radius: 25px;
            border: 3px solid #00ffa6;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 15px #00ffa6;
            animation: neonBreathe 3s infinite alternate;
        }

        @keyframes neonBreathe {
            0% { box-shadow: 0 0 10px #00ffa6; border-color: #00ffa6; }
            100% { box-shadow: 0 0 30px #00ffa6; border-color: #00ffcc; }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sections Logic */
        .page { 
            display: none; 
            padding: 20px; 
            margin-bottom: 100px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #scanPage { display: block; }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: gold;
            min-height: 40px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #credit {
            margin-top: 50px;
            font-size: 11px;
            color: gold;
            letter-spacing: 3px;
            opacity: 0.7;
        }

        /* Premium Navigation with Bent Fading Line */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #222;
            z-index: 1000;
        }

        nav div {
            color: #555;
            font-size: 10px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            text-align: center;
        }

        nav div.active {
            color: #00ffa6;
        }

        nav div.active::after {
            content: "";
            position: absolute;
            top: -15px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
            box-shadow: 0 0 12px #00d2ff;
            border-radius: 50% 50% 0 0; /* Bent effect */
        }

        /* Register Dashboard Styles */
        .reg-card {
            background: #111;
            border: 1px solid #333;
            padding: 35px 25px;
            border-radius: 20px;
            margin: 40px auto;
            width: 80%;
            color: #00ffa6;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .reg-card:active {
            transform: scale(0.95);
            border-color: #00ffa6;
        }

        .beast-input {
            width: 85%;
            padding: 15px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .beast-input:focus {
            border-color: #00ffa6;
        }

        .beast-btn {
            background: #00ffa6;
            color: black;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 90%;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        h2 { margin-bottom: 20px; }
    </style>
</head>

<body>

<header>PRESENTY BEAST</header>

<div id="scanPage" class="page">
    <div id="cameraBox">
        <video id="video" autoplay muted></video>
    </div>
    <div id="message">INITIALIZING AI...</div>
    <div id="credit">BY © PARTH VISHNU YADAV</div>
</div>

<div id="registerPage" class="page">
    <div id="regDashboard">
        <div class="reg-card" onclick="showRegForm()">
            <span style="font-size: 40px;">➕</span><br><br>
            REGISTER NEW STUDENT
        </div>
    </div>

    <div id="regForm" style="display: none;">
        <h2 style="color: #00ffa6;">NEW REGISTRATION</h2>
        <input type="text" id="studentName" class="beast-input" placeholder="Enter Student Name">
        <input type="number" id="parentMobile" class="beast-input" placeholder="Parent Mobile Number">
        <button id="captureBtn" onclick="startCapture()" class="beast-btn">CAPTURE FACE</button>
        <button id="saveBtn" onclick="saveStudent()" class="beast-btn" style="background: gold; display: none;">SAVE STUDENT DATA</button>
    </div>
</div>

<div id="reportsPage" class="page">
    <h2 style="color: #00ffa6;">REPORTS</h2>
    <div id="reportList" style="color: #888;">No attendance logs yet.</div>
</div>

<nav>
    <div id="nav-scan" class="active" onclick="showPage('scanPage')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M3 3l2 2m16-2l-2 2m-2 14l2 2m-16-2l-2 2"></path>
        </svg>
        <br>SCAN
    </div>
    <div id="nav-reg" onclick="showPage('registerPage')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="17" y1="11" x2="23" y2="11"></line>
        </svg>
        <br>REGISTER
    </div>
    <div id="nav-rep" onclick="showPage('reportsPage')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
        </svg>
        <br>REPORTS
    </div>
</nav>

<script src="app.js"></script>

</body>
</html>
