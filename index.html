<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PRESENTY BEAST</title>

<link rel="manifest" href="manifest.json">

<script src="face-api.min.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

header{
font-size:26px;
letter-spacing:6px;
padding:20px;
border-bottom:1px solid #333;
}

#cameraBox{
margin:25px auto;
width:85%;
height:240px;
border-radius:22px;
border:3px solid #00ffa6;
box-shadow:0 0 20px #00ffa6;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

#message{
margin-top:20px;
font-size:20px;
color:gold;
min-height:40px;
}

#credit{
margin-top:100px;
font-size:13px;
color:gold;
letter-spacing:3px;
}

nav{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #333;
}

nav div{
color:#aaa;
font-size:14px;
}

nav div.active{
color:#00ffa6;
}

</style>

</head>

<body>

<header>PRESENTY BEAST</header>

<div id="cameraBox">
<video id="video" autoplay muted></video>
</div>

<div id="message">
INITIALIZING AI...
</div>

<div id="credit">
BY © PARTH VISHNU YADAV
</div>

<nav>
<div class="active">SCAN</div>
<div>REGISTER</div>
<div>REPORTS</div>
</nav>

<script>

const video = document.getElementById("video")
const message = document.getElementById("message")

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:true
})

video.srcObject = stream

}catch(e){

message.innerText = "CAMERA ERROR"

}

}

async function loadModels(){

try{

const MODEL_URL = "models"

await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

message.innerText = "AI READY"

}catch(err){

console.log(err)
message.innerText = "AI FAILED TO LOAD"

}

}

async function init(){

await startCamera()
await loadModels()

}

init()


if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}

</script>

</body>
</html>
